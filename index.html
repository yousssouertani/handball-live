<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤾 Live Handball — Aube 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0c10;--surface:#13161d;--card:#1a1e28;--border:#252a38;--accent:#e8ff47;--accent2:#ff4f5e;--text:#f0f2f7;--muted:#6b7280;--live:#ff4f5e;--done:#4ade80;--sat:#3b82f6;--sun:#f97316;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

  #admin-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center;padding:24px;}
  #admin-modal.open{display:flex;}
  .modal-box{background:var(--surface);border:1.5px solid var(--accent);border-radius:16px;padding:28px;max-width:340px;width:100%;}
  .modal-box h3{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--text);margin-bottom:16px;letter-spacing:2px;}
  .modal-err{color:var(--accent2);font-size:.78rem;margin-bottom:10px;display:none;}
  .modal-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;padding:10px 14px;outline:none;margin-bottom:12px;}
  .modal-input:focus{border-color:var(--accent);}
  .modal-btns{display:flex;gap:8px;}
  .btn-ok{flex:1;padding:10px;background:var(--accent);color:#111;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;}
  .btn-cancel{padding:10px 16px;background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;}

  header{background:var(--surface);border-bottom:2px solid var(--accent);padding:18px 20px 14px;position:sticky;top:0;z-index:100;}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;color:var(--accent);line-height:1;}
  .logo span{color:var(--text);}
  .header-right{display:flex;align-items:center;gap:8px;}
  .live-pill{display:flex;align-items:center;gap:5px;background:rgba(255,79,94,.12);border:1px solid var(--accent2);color:var(--accent2);font-size:.7rem;font-weight:700;letter-spacing:1.5px;padding:4px 10px;border-radius:20px;text-transform:uppercase;}
  .live-dot{width:6px;height:6px;background:var(--accent2);border-radius:50%;animation:blink 1.2s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .btn-admin{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase;transition:all .2s;}
  .btn-admin:hover{border-color:var(--accent);color:var(--accent);}
  .btn-admin.on{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.08);}
  .tabs{display:flex;gap:6px;}
  .tab{padding:6px 16px;border-radius:6px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s;}
  .tab.sat.active,.tab.sat:hover{border-color:var(--sat);color:var(--sat);background:rgba(59,130,246,.08);}
  .tab.sun.active,.tab.sun:hover{border-color:var(--sun);color:var(--sun);background:rgba(249,115,22,.08);}
  .tab.all.active,.tab.all:hover{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.08);}

  .sync-bar{background:var(--card);border-bottom:1px solid var(--border);padding:5px 20px;display:flex;align-items:center;gap:7px;font-size:.7rem;color:var(--muted);}
  .sdot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;}
  .sdot.ok{background:var(--done);}
  .sdot.busy{background:var(--accent);animation:blink .8s infinite;}
  .sdot.err{background:var(--accent2);}

  main{padding:20px 14px;max-width:700px;margin:0 auto;}
  .day-label{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:3px;margin:24px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--border);color:var(--muted);}
  .day-label.sat{color:var(--sat);border-color:rgba(59,130,246,.25);}
  .day-label.sun{color:var(--sun);border-color:rgba(249,115,22,.25);}

  .mc{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden;transition:border-color .2s;}
  .mc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);}
  .mc.live{border-color:rgba(255,79,94,.2);}
  .mc.live::before{background:var(--live);}
  .mc.done::before{background:var(--done);}

  .ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .cat{font-size:.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
  .sbadge{font-size:.67rem;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:4px;text-transform:uppercase;}
  .sbadge.live{background:rgba(255,79,94,.15);color:var(--live);border:1px solid var(--live);}
  .sbadge.done{background:rgba(74,222,128,.1);color:var(--done);border:1px solid var(--done);}
  .sbadge.pending{background:rgba(107,114,128,.08);color:var(--muted);border:1px solid var(--border);}

  .sr{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:10px;}
  .tb{display:flex;flex-direction:column;}
  .tb.r{align-items:flex-end;text-align:right;}
  .tn{font-weight:700;font-size:.9rem;line-height:1.2;color:var(--text);}
  .sc-wrap{display:flex;align-items:center;gap:3px;}
  .sc-btns{display:flex;flex-direction:column;gap:3px;}
  .sc-btns.l{order:-1;}
  .sb{width:26px;height:26px;border:none;border-radius:5px;font-size:.95rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s;line-height:1;}
  .sb:disabled{opacity:.15;cursor:not-allowed;}
  .sb.plus{background:rgba(232,255,71,.12);color:var(--accent);}
  .sb.plus:hover:not(:disabled){background:rgba(232,255,71,.28);}
  .sb.minus{background:rgba(107,114,128,.12);color:var(--muted);font-size:.8rem;}
  .sb.minus:hover:not(:disabled){background:rgba(107,114,128,.25);}
  .sblock{display:flex;align-items:center;}
  .snum{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;line-height:1;color:var(--text);min-width:42px;text-align:center;}
  .ssep{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;color:var(--muted);margin:0 1px;}

  .cf{display:flex;justify-content:space-between;align-items:center;gap:8px;border-top:1px solid var(--border);padding-top:9px;flex-wrap:wrap;}
  .meta{font-size:.7rem;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;}
  .abtns{display:flex;gap:5px;align-items:center;}
  .abtn{padding:4px 11px;border-radius:5px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .12s;}
  .abtn.start{border-color:var(--accent);color:var(--accent);}
  .abtn.start:hover{background:rgba(232,255,71,.08);}
  .abtn.end{border-color:var(--done);color:var(--done);}
  .abtn.end:hover{background:rgba(74,222,128,.08);}
  .abtn.rst:hover{border-color:var(--accent2);color:var(--accent2);}
  .timer{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--accent);letter-spacing:2px;min-width:48px;text-align:center;}
  .timer.live{color:var(--live);}
  .ro{text-align:center;font-size:.68rem;color:var(--muted);padding:6px 0 0;border-top:1px solid var(--border);margin-top:6px;}

  .loading{text-align:center;padding:60px 20px;color:var(--muted);}
  .loading b{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--accent);animation:blink 1s infinite;display:block;margin-bottom:6px;}
  .toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1.5px solid var(--accent);color:var(--accent);padding:9px 16px;border-radius:8px;font-size:.8rem;font-weight:600;z-index:999;transform:translateY(70px);opacity:0;transition:all .28s;pointer-events:none;}
  .toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>

<div id="admin-modal">
  <div class="modal-box">
    <h3>🔐 MODE ADMIN</h3>
    <div class="modal-err" id="merr">❌ Mot de passe incorrect</div>
    <input class="modal-input" type="password" id="mpwd" placeholder="Mot de passe admin" onkeydown="if(event.key==='Enter')checkAdmin()"/>
    <div class="modal-btns">
      <button class="btn-ok" onclick="checkAdmin()">Entrer</button>
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
    </div>
  </div>
</div>

<header>
  <div class="header-top">
    <div class="logo">🤾 HAND<span>LIVE</span></div>
    <div class="header-right">
      <div class="live-pill"><div class="live-dot"></div>LIVE</div>
      <button class="btn-admin" id="abtn" onclick="toggleAdmin()">Admin</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab all active" onclick="filterDay('all')">Tous</button>
    <button class="tab sat" onclick="filterDay('sat')">Sam 6</button>
    <button class="tab sun" onclick="filterDay('sun')">Dim 7</button>
  </div>
</header>

<div class="sync-bar"><div class="sdot" id="sdot"></div><span id="slbl">Connexion...</span></div>
<main id="app"><div class="loading"><b>CHARGEMENT</b>Récupération des scores...</div></main>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
const BIN_ID     = '69f38e1a856a6821898fbdc7';
const MASTER_KEY = '$2a$10$xJaHeEJVUxMdv9RphJx9cODE66F2oymH0dH6lEiHKVwY08KXSFdb.';
const ADMIN_PASS = 'coupeaube2526';

const DEFAULT = [
  {id:1,day:'sat',category:'Moins 11 Filles',time:'10h30',format:'3x12 — pause 5min',vestiaire:'1-2 Hand',home:'RSJH',away:'ASMT',arbitres:'R. Diop & P.A. Yao',handicap:'',status:'pending',scoreHome:0,scoreAway:0,elapsed:0},
  {id:2,day:'sat',category:'Moins 13 Filles',time:'12h00',format:'3x15 — pause 5min',vestiaire:'3-4 Hand',home:'RSJH',away:'ASMT',arbitres:'M. Bourgeois & M. Lambelin',handicap:'',status:'pending',scoreHome:0,scoreAway:0,elapsed:0},
  {id:3,day:'sat',category:'Moins 11 Garçons',time:'14h00',format:'3x12 — pause 5min',vestiaire:'1-2 Foot',home:'RSJH',away:'HBCSC',arbitres:'L.P. Visse',handicap:'',status:'pending',scoreHome:0,scoreAway:0,elapsed:0},
  {id:4,day:'sat',category:'Moins 15 Garçons',time:'16h00',format:'3x18 — pause 5min',vestiaire:'3-4 Foot',home:'HBCSC',away:'RSJH',arbitres:'B. Laurent & Sautereau',handicap:'',status:'pending',scoreHome:0,scoreAway:0,elapsed:0},
  {id:5,day:'sat',category:'Moins 18 Garçons',time:'18h00',format:'2x30 — pause 10min',vestiaire:'1-2 Hand',home:'RHB',away:'Entente USSM/Savino',arbitres:'O. Blondet & E. Florian',handicap:'2x5 buts retard RHB',status:'pending',scoreHome:0,scoreAway:0,elapsed:0},
  {id:6,day:'sat',category:'Moins 18 Filles',time:'20h00',format:'2x30 — pause 10min',vestiaire:'3-4 Hand',home:'Entente ASMT/ARCIS',away:'Entente RSJH SAVINO',arbitres:'A. Haby & G. Buda',handicap:'',status:'pending',scoreHome:0,scoreAway:0,elapsed:0},
  {id:7,day:'sun',category:'Moins 15 Filles',time:'10h00',format:'3x18 — pause 5min',vestiaire:'1-2 Hand',home:'Entente ASMT/ARCIS',away:'HBCSC',arbitres:'M. El Battani & H. Pointer',handicap:'',status:'pending',scoreHome:0,scoreAway:0,elapsed:0},
  {id:8,day:'sun',category:'Moins 13 Garçons',time:'12h00',format:'3x15 — pause 5min',vestiaire:'1-2 Foot',home:'RSJH',away:'ETAC',arbitres:'B. Bertolo & Y. Colombet',handicap:'3x3 buts retard RSJH',status:'pending',scoreHome:0,scoreAway:0,elapsed:0},
  {id:9,day:'sun',category:'Plus 16 Filles',time:'14h00',format:'2x30 — pause 10min',vestiaire:'1-2 Hand',home:'Bar Sur Seine',away:'HBCSC',arbitres:'B. Laurent & Sautereau',handicap:'',status:'pending',scoreHome:0,scoreAway:0,elapsed:0},
  {id:10,day:'sun',category:'🏆 Supercoupe +16 Garçons',time:'16h00',format:'2x30 — pause 10min',vestiaire:'3-4 Hand',home:'Bar Sur Seine',away:'ETAC',arbitres:'T. Bradja & C. Duquesnoy',handicap:'',status:'pending',scoreHome:0,scoreAway:0,elapsed:0},
  {id:11,day:'sun',category:'Plus 16 Masculin',time:'18h00',format:'2x30 — pause 10min',vestiaire:'1-2 Hand',home:'Nogent',away:'Bar Sur Aube',arbitres:'L. Doré & A. Sanguinède',handicap:'',status:'pending',scoreHome:0,scoreAway:0,elapsed:0}
];

// ═══════════════════════════════════════════════════════
//  STATE  — single source of truth
// ═══════════════════════════════════════════════════════
let matches    = [];          // live data
let isAdmin    = false;
let filter     = 'all';
const clocks   = {};          // setInterval handles per match id

// Lock flags to prevent race conditions
let saveInFlight = false;     // a PUT is running
let fetchBlocked = false;     // block fetch while admin is editing

// ═══════════════════════════════════════════════════════
//  SYNC HELPERS
// ═══════════════════════════════════════════════════════
function sync(state, txt) {
  document.getElementById('sdot').className = 'sdot ' + state;
  document.getElementById('slbl').textContent = txt;
}
function ts() { return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }

// ═══════════════════════════════════════════════════════
//  FETCH  (read from JSONBin)
// ═══════════════════════════════════════════════════════
async function fetchData() {
  // Never overwrite local state while admin is saving or editing
  if (fetchBlocked || saveInFlight) return;

  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: {'X-Master-Key': MASTER_KEY}
    });
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    const remote = data.record && Array.isArray(data.record.handball) ? data.record.handball : null;

    if (!remote) {
      // First time: bin has no handball key → push defaults
      matches = JSON.parse(JSON.stringify(DEFAULT));
      await saveData();
    } else if (!matches.length) {
      // First load: take remote as-is
      matches = remote;
      restartClocks();
    } else if (!isAdmin) {
      // Viewer: always trust remote
      mergeRemote(remote);
    }
    // If admin is logged in: do NOT overwrite local state with remote
    sync('ok', 'Synchronisé — ' + ts());
    render();
  } catch(e) {
    sync('err', 'Erreur de connexion');
  }
}

// Merge remote into local WITHOUT touching matches admin is editing
function mergeRemote(remote) {
  remote.forEach(rm => {
    const lm = matches.find(x => x.id === rm.id);
    if (!lm) return;
    lm.status = rm.status;
    lm.scoreHome = rm.scoreHome;
    lm.scoreAway = rm.scoreAway;
    lm.elapsed = rm.elapsed;
    // Sync clock state
    if (rm.status === 'live' && !clocks[rm.id]) startClock(rm.id);
    if (rm.status !== 'live' && clocks[rm.id]) stopClock(rm.id);
  });
}

// ═══════════════════════════════════════════════════════
//  SAVE  (write to JSONBin)
// ═══════════════════════════════════════════════════════
async function saveData() {
  if (saveInFlight) return;   // already saving — skip, next call will catch up
  saveInFlight = true;
  fetchBlocked = true;
  sync('busy', 'Sauvegarde...');
  try {
    const body = JSON.stringify({ handball: matches });
    const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method:  'PUT',
      headers: {'Content-Type':'application/json','X-Master-Key': MASTER_KEY},
      body
    });
    if (!r.ok) throw new Error(r.status);
    sync('ok', 'Sauvegardé — ' + ts());
  } catch(e) {
    sync('err', 'Échec sauvegarde — réessaye');
  } finally {
    saveInFlight = false;
    // Unblock fetch 3 seconds after save completes (gives time for JSONBin to propagate)
    setTimeout(() => { fetchBlocked = false; }, 3000);
  }
}

// ═══════════════════════════════════════════════════════
//  CLOCKS
// ═══════════════════════════════════════════════════════
function fmt(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}
function startClock(id) {
  if (clocks[id]) return;
  clocks[id] = setInterval(() => {
    const m = matches.find(x => x.id === id);
    if (!m || m.status !== 'live') { stopClock(id); return; }
    m.elapsed++;
    const el = document.getElementById('t-' + id);
    if (el) el.textContent = fmt(m.elapsed);
    // Save elapsed every 60s to avoid flooding API
    if (m.elapsed % 60 === 0) saveData();
  }, 1000);
}
function stopClock(id) {
  clearInterval(clocks[id]);
  delete clocks[id];
}
function restartClocks() {
  matches.filter(m => m.status === 'live').forEach(m => startClock(m.id));
}

// ═══════════════════════════════════════════════════════
//  ADMIN ACTIONS  (all block fetch while operating)
// ═══════════════════════════════════════════════════════
function act(fn) {
  if (!isAdmin) return;
  fetchBlocked = true;   // block polling while we act
  fn();
  saveData();
  render();
}

function startMatch(id) {
  act(() => {
    const m = matches.find(x=>x.id===id);
    m.status = 'live';
    startClock(id);
    showToast(`▶ ${m.home} vs ${m.away} — Lancé !`);
  });
}
function endMatch(id) {
  act(() => {
    const m = matches.find(x=>x.id===id);
    m.status = 'done';
    stopClock(id);
    showToast(`✅ ${m.home} ${m.scoreHome}:${m.scoreAway} ${m.away}`);
  });
}
function resetMatch(id) {
  act(() => {
    const m = matches.find(x=>x.id===id);
    m.status = 'pending'; m.scoreHome = 0; m.scoreAway = 0; m.elapsed = 0;
    stopClock(id);
  });
}
function changeScore(id, side, d) {
  act(() => {
    const m = matches.find(x=>x.id===id);
    if (side==='h') m.scoreHome = Math.max(0, m.scoreHome + d);
    else            m.scoreAway = Math.max(0, m.scoreAway + d);
    // Update DOM immediately for snappy feel
    const eh = document.getElementById('sh-'+id);
    const ea = document.getElementById('sa-'+id);
    if (eh) eh.textContent = m.scoreHome;
    if (ea) ea.textContent = m.scoreAway;
  });
}

// ═══════════════════════════════════════════════════════
//  ADMIN LOGIN
// ═══════════════════════════════════════════════════════
function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false;
    fetchBlocked = false;
    document.getElementById('abtn').textContent = 'Admin';
    document.getElementById('abtn').classList.remove('on');
    render();
    showToast('🔒 Mode admin désactivé');
  } else {
    document.getElementById('admin-modal').classList.add('open');
    setTimeout(() => document.getElementById('mpwd').focus(), 80);
  }
}
function closeModal() {
  document.getElementById('admin-modal').classList.remove('open');
  document.getElementById('mpwd').value = '';
  document.getElementById('merr').style.display = 'none';
}
function checkAdmin() {
  if (document.getElementById('mpwd').value === ADMIN_PASS) {
    isAdmin = true;
    fetchBlocked = true;   // don't let polling overwrite while admin works
    closeModal();
    document.getElementById('abtn').textContent = '🔓 Admin ON';
    document.getElementById('abtn').classList.add('on');
    render();
    showToast('✅ Mode admin activé');
  } else {
    document.getElementById('merr').style.display = 'block';
  }
}

// ═══════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════
function filterDay(day) {
  filter = day;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab.' + day).classList.add('active');
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function render() {
  if (!matches.length) return;
  const app  = document.getElementById('app');
  const days = filter === 'all' ? ['sat','sun'] : [filter];
  const lbls = {sat:'Samedi 6 Juin', sun:'Dimanche 7 Juin'};
  let html   = '';

  days.forEach(day => {
    if (filter === 'all') html += `<div class="day-label ${day}">${lbls[day]}</div>`;
    matches.filter(m => m.day === day).forEach(m => {
      const live = m.status === 'live', done = m.status === 'done';
      const sl   = live ? 'En cours' : done ? 'Terminé' : m.time;
      const dis  = isAdmin ? '' : 'disabled';
      html += `
<div class="mc ${m.status}">
  <div class="ch">
    <span class="cat">${m.category}</span>
    <span class="sbadge ${m.status}">${sl}</span>
  </div>
  <div class="sr">
    <div class="tb"><div class="tn">${m.home}</div></div>
    <div class="sc-wrap">
      <div class="sc-btns l">
        <button class="sb plus" onclick="changeScore(${m.id},'h',1)" ${dis}>+</button>
        <button class="sb minus" onclick="changeScore(${m.id},'h',-1)" ${dis}>−</button>
      </div>
      <div class="sblock">
        <span class="snum" id="sh-${m.id}">${m.scoreHome}</span>
        <span class="ssep">:</span>
        <span class="snum" id="sa-${m.id}">${m.scoreAway}</span>
      </div>
      <div class="sc-btns">
        <button class="sb plus" onclick="changeScore(${m.id},'a',1)" ${dis}>+</button>
        <button class="sb minus" onclick="changeScore(${m.id},'a',-1)" ${dis}>−</button>
      </div>
    </div>
    <div class="tb r"><div class="tn">${m.away}</div></div>
  </div>
  <div class="cf">
    <div class="meta">
      <span>⏱ ${m.format}</span>
      ${m.handicap ? `<span>⚖️ ${m.handicap}</span>` : ''}
      <span>🏟 ${m.vestiaire}</span>
      <span>👤 ${m.arbitres}</span>
    </div>
    <div class="abtns">
      <span class="timer ${live?'live':''}" id="t-${m.id}">${fmt(m.elapsed)}</span>
      ${isAdmin ? `
        ${!live&&!done ? `<button class="abtn start" onclick="startMatch(${m.id})">▶ Démarrer</button>` : ''}
        ${live         ? `<button class="abtn end"   onclick="endMatch(${m.id})">■ Terminer</button>`  : ''}
        ${live||done   ? `<button class="abtn rst"   onclick="resetMatch(${m.id})">↺</button>`         : ''}
      ` : ''}
    </div>
  </div>
  ${!isAdmin ? `<div class="ro">👁 Lecture seule — scores en direct</div>` : ''}
</div>`;
    });
  });

  app.innerHTML = html || '<div style="text-align:center;padding:60px;color:var(--muted)">Aucun match</div>';
  restartClocks();
}

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
fetchData();

// Poll every 15s — but only when admin is NOT logged in
setInterval(() => {
  if (!isAdmin) fetchData();
}, 15000);
</script>
</body>
</html>
