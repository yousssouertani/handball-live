<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤾 Live Handball — Aube 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0c10;--surface:#13161d;--card:#1a1e28;--border:#252a38;
    --accent:#e8ff47;--accent2:#ff4f5e;--text:#f0f2f7;--muted:#6b7280;
    --live:#ff4f5e;--done:#4ade80;--sat:#3b82f6;--sun:#f97316;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

  /* ADMIN MODAL */
  #admin-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:150;display:none;align-items:center;justify-content:center;padding:24px;}
  #admin-modal.open{display:flex;}
  .modal-box{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:28px;max-width:360px;width:100%;}
  .modal-box h3{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--text);margin-bottom:16px;letter-spacing:2px;}
  .modal-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;padding:10px 14px;outline:none;margin-bottom:12px;}
  .modal-input:focus{border-color:var(--accent);}
  .modal-btns{display:flex;gap:8px;}
  .btn-ok{flex:1;padding:10px;background:var(--accent);color:#111;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;}
  .btn-cancel{padding:10px 16px;background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;}
  .modal-error{color:var(--accent2);font-size:.78rem;margin-bottom:10px;display:none;}

  /* HEADER */
  header{background:var(--surface);border-bottom:2px solid var(--accent);padding:20px 24px 16px;position:sticky;top:0;z-index:100;}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;color:var(--accent);line-height:1;}
  .logo span{color:var(--text);}
  .header-right{display:flex;align-items:center;gap:10px;}
  .live-pill{display:flex;align-items:center;gap:6px;background:rgba(255,79,94,.15);border:1px solid var(--accent2);color:var(--accent2);font-size:.72rem;font-weight:700;letter-spacing:1.5px;padding:4px 10px;border-radius:20px;text-transform:uppercase;}
  .live-dot{width:7px;height:7px;background:var(--accent2);border-radius:50%;animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
  .btn-admin{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase;transition:all .2s;}
  .btn-admin:hover{border-color:var(--accent);color:var(--accent);}
  .btn-admin.active{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.08);}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;}
  .tab{padding:7px 18px;border-radius:6px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;}
  .tab.sat.active,.tab.sat:hover{border-color:var(--sat);color:var(--sat);background:rgba(59,130,246,.08);}
  .tab.sun.active,.tab.sun:hover{border-color:var(--sun);color:var(--sun);background:rgba(249,115,22,.08);}
  .tab.all.active,.tab.all:hover{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.08);}

  /* SYNC BAR */
  .sync-bar{background:var(--card);border-bottom:1px solid var(--border);padding:6px 24px;display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--muted);}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
  .sync-dot.ok{background:var(--done);}
  .sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite;}
  .sync-dot.error{background:var(--accent2);}

  /* MAIN */
  main{padding:24px 16px;max-width:720px;margin:0 auto;}
  .day-label{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;color:var(--muted);margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .day-label.sat{color:var(--sat);border-color:rgba(59,130,246,.3);}
  .day-label.sun{color:var(--sun);border-color:rgba(249,115,22,.3);}

  .match-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden;}
  .match-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);border-radius:3px 0 0 3px;}
  .match-card.live::before{background:var(--live);}
  .match-card.done::before{background:var(--done);}

  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .category{font-size:.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
  .status-badge{font-size:.7rem;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:4px;text-transform:uppercase;}
  .status-badge.live{background:rgba(255,79,94,.2);color:var(--live);border:1px solid var(--live);}
  .status-badge.done{background:rgba(74,222,128,.15);color:var(--done);border:1px solid var(--done);}
  .status-badge.pending{background:rgba(107,114,128,.1);color:var(--muted);border:1px solid var(--border);}

  .score-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-bottom:12px;}
  .team-block{display:flex;flex-direction:column;}
  .team-block.right{align-items:flex-end;text-align:right;}
  .team-name{font-weight:700;font-size:.95rem;line-height:1.2;color:var(--text);}
  .score-block{display:flex;align-items:center;}
  .score-num{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;line-height:1;color:var(--text);min-width:44px;text-align:center;}
  .score-sep{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--muted);margin:0 2px;}
  .score-controls{display:flex;flex-direction:column;gap:3px;margin-left:4px;}
  .score-controls.left{margin-left:0;margin-right:4px;}
  .btn-score{width:28px;height:28px;border:none;border-radius:5px;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .btn-score:disabled{opacity:.2;cursor:not-allowed;}
  .btn-plus{background:rgba(232,255,71,.15);color:var(--accent);}
  .btn-plus:hover:not(:disabled){background:rgba(232,255,71,.3);}
  .btn-minus{background:rgba(107,114,128,.15);color:var(--muted);font-size:.85rem;}
  .btn-minus:hover:not(:disabled){background:rgba(107,114,128,.3);}

  .card-footer{display:flex;justify-content:space-between;align-items:center;gap:8px;border-top:1px solid var(--border);padding-top:10px;flex-wrap:wrap;}
  .meta-info{font-size:.73rem;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;}
  .action-btns{display:flex;gap:6px;}
  .btn-action{padding:5px 12px;border-radius:5px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .15s;}
  .btn-start{border-color:var(--accent);color:var(--accent);}
  .btn-start:hover{background:rgba(232,255,71,.1);}
  .btn-end{border-color:var(--done);color:var(--done);}
  .btn-end:hover{background:rgba(74,222,128,.1);}
  .btn-reset:hover{border-color:var(--accent2);color:var(--accent2);}
  .timer-display{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--accent);letter-spacing:2px;min-width:52px;text-align:center;}
  .timer-display.live{color:var(--live);}
  .readonly-notice{text-align:center;font-size:.72rem;color:var(--muted);padding:8px 0 0;border-top:1px solid var(--border);margin-top:8px;}

  .loading{text-align:center;padding:60px 20px;color:var(--muted);}
  .loading span{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:3px;color:var(--accent);animation:pulse 1s infinite;display:block;margin-bottom:8px;}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1.5px solid var(--accent);color:var(--accent);padding:10px 18px;border-radius:8px;font-size:.82rem;font-weight:600;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;}
  .toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>

<!-- ADMIN MODAL -->
<div id="admin-modal">
  <div class="modal-box">
    <h3>🔐 MODE ADMIN</h3>
    <div class="modal-error" id="modal-error">❌ Mot de passe incorrect</div>
    <input class="modal-input" type="password" id="admin-pass-input" placeholder="Mot de passe admin" onkeydown="if(event.key==='Enter')checkAdmin()"/>
    <div class="modal-btns">
      <button class="btn-ok" onclick="checkAdmin()">Entrer</button>
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
    </div>
  </div>
</div>

<header>
  <div class="header-top">
    <div class="logo">🤾 HAND<span>LIVE</span></div>
    <div class="header-right">
      <div class="live-pill"><div class="live-dot"></div>LIVE</div>
      <button class="btn-admin" id="admin-btn" onclick="toggleAdmin()">Admin</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab all active" onclick="filterDay('all')">Tous</button>
    <button class="tab sat" onclick="filterDay('sat')">Samedi 6</button>
    <button class="tab sun" onclick="filterDay('sun')">Dimanche 7</button>
  </div>
</header>

<div class="sync-bar">
  <div class="sync-dot" id="sync-dot"></div>
  <span id="sync-label">Connexion...</span>
</div>

<main id="main-content">
  <div class="loading"><span>CHARGEMENT</span>Récupération des scores...</div>
</main>
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const BIN_ID    = '69f38e1a856a6821898fbdc7';
const MASTER_KEY = '$2a$10$xJaHeEJVUxMdv9RphJx9cODE66F2oymH0dH6lEiHKVwY08KXSFdb.';
const ADMIN_PASS = 'comiteaube2026'; // change ce mot de passe si tu veux

const MATCHES_DEFAULT = [
  {id:1,day:'sat',category:'Moins 11 Filles',time:'10h30',format:'3x12 — pause 5min',vestiaire:'1-2 Hand',home:'RSJH',away:'ASMT',arbitres:'R. Diop & P.A. Yao',status:'pending',scoreHome:0,scoreAway:0,elapsed:0,timerRunning:false},
  {id:2,day:'sat',category:'Moins 13 Filles',time:'12h00',format:'3x15 — pause 5min',vestiaire:'3-4 Hand',home:'RSJH',away:'ASMT',arbitres:'M. Bourgeois & M. Lambelin',status:'pending',scoreHome:0,scoreAway:0,elapsed:0,timerRunning:false},
  {id:3,day:'sat',category:'Moins 11 Garçons',time:'14h00',format:'3x12 — pause 5min',vestiaire:'1-2 Foot',home:'RSJH',away:'HBCSC',arbitres:'L.P. Visse',status:'pending',scoreHome:0,scoreAway:0,elapsed:0,timerRunning:false},
  {id:4,day:'sat',category:'Moins 15 Garçons',time:'16h00',format:'3x18 — pause 5min',vestiaire:'3-4 Foot',home:'HBCSC',away:'RSJH',arbitres:'B. Laurent & Sautereau',status:'pending',scoreHome:0,scoreAway:0,elapsed:0,timerRunning:false},
  {id:5,day:'sat',category:'Moins 18 Garçons',time:'18h00',format:'2x30 — pause 10min',vestiaire:'1-2 Hand',home:'RHB',away:'Entente USSM / Savino',arbitres:'O. Blondet & E. Florian',handicap:'2x5 buts retard pour RHB',status:'pending',scoreHome:0,scoreAway:0,elapsed:0,timerRunning:false},
  {id:6,day:'sat',category:'Moins 18 Filles',time:'20h00',format:'2x30 — pause 10min',vestiaire:'3-4 Hand',home:'Entente ASMT/ARCIS',away:'Entente RSJH SAVINO',arbitres:'A. Haby & G. Buda',status:'pending',scoreHome:0,scoreAway:0,elapsed:0,timerRunning:false},
  {id:7,day:'sun',category:'Moins 15 Filles',time:'10h00',format:'3x18 — pause 5min',vestiaire:'1-2 Hand',home:'Entente ASMT/ARCIS',away:'HBCSC',arbitres:'M. El Battani & H. Pointer',status:'pending',scoreHome:0,scoreAway:0,elapsed:0,timerRunning:false},
  {id:8,day:'sun',category:'Moins 13 Garçons',time:'12h00',format:'3x15 — pause 5min',vestiaire:'1-2 Foot',home:'RSJH',away:'ETAC',arbitres:'B. Bertolo & Y. Colombet',handicap:'3x3 buts de retard pour RSJH',status:'pending',scoreHome:0,scoreAway:0,elapsed:0,timerRunning:false},
  {id:9,day:'sun',category:'Plus 16 Filles',time:'14h00',format:'2x30 — pause 10min',vestiaire:'1-2 Hand',home:'Bar Sur Seine',away:'HBCSC',arbitres:'B. Laurent & Sautereau',status:'pending',scoreHome:0,scoreAway:0,elapsed:0,timerRunning:false},
  {id:10,day:'sun',category:'🏆 Supercoupe Plus 16 Garçons',time:'16h00',format:'2x30 — pause 10min',vestiaire:'3-4 Hand',home:'Bar Sur Seine',away:'ETAC',arbitres:'T. Bradja & C. Duquesnoy',status:'pending',scoreHome:0,scoreAway:0,elapsed:0,timerRunning:false},
  {id:11,day:'sun',category:'Plus 16 Masculin',time:'18h00',format:'2x30 — pause 10min',vestiaire:'1-2 Hand',home:'Nogent',away:'Bar Sur Aube',arbitres:'L. Doré & A. Sanguinède',status:'pending',scoreHome:0,scoreAway:0,elapsed:0,timerRunning:false}
];

// ── STATE ───────────────────────────────────────────────────────────────────
let isAdmin = false, currentFilter = 'all', matches = [], isSaving = false;
const timers = {};

// ── JSONBIN ─────────────────────────────────────────────────────────────────
function setSyncStatus(state, label) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-label').textContent = label;
}

async function fetchData() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: { 'X-Master-Key': MASTER_KEY }
    });
    const data = await res.json();
    // First load or remote has handball data
    const remote = data.record && data.record.handball ? data.record.handball : null;
    if (!remote) {
      // Bin exists but no handball key yet — push defaults
      await pushData(MATCHES_DEFAULT);
      matches = MATCHES_DEFAULT;
    } else {
      if (!matches.length) {
        matches = remote;
      } else {
        // Merge remote scores into local (keep timers running)
        remote.forEach(rm => {
          const lm = matches.find(x => x.id === rm.id);
          if (!lm) return;
          lm.scoreHome = rm.scoreHome; lm.scoreAway = rm.scoreAway;
          lm.status = rm.status; lm.elapsed = rm.elapsed;
          if (!lm.timerRunning && rm.timerRunning && rm.status === 'live') { lm.timerRunning = true; startTimer(lm.id); }
          if (lm.timerRunning && rm.status === 'done') { lm.timerRunning = false; clearInterval(timers[lm.id]); delete timers[lm.id]; }
        });
      }
    }
    setSyncStatus('ok', 'Synchronisé — ' + new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
    render();
  } catch(e) {
    setSyncStatus('error', 'Erreur de connexion');
    console.error(e);
  }
}

async function pushData(data) {
  if (isSaving) return; isSaving = true;
  setSyncStatus('syncing', 'Sauvegarde...');
  const payload = data || matches;
  try {
    // We store under a "handball" key to not overwrite fair-play data
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
      body: JSON.stringify({ handball: payload })
    });
    if (!res.ok) throw new Error(res.status);
    setSyncStatus('ok', 'Sauvegardé — ' + new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
  } catch(e) {
    setSyncStatus('error', 'Échec sauvegarde');
    console.error(e);
  }
  isSaving = false;
}

// ── ADMIN ───────────────────────────────────────────────────────────────────
function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false;
    document.getElementById('admin-btn').textContent = 'Admin';
    document.getElementById('admin-btn').classList.remove('active');
    render(); showToast('🔒 Mode admin désactivé');
  } else {
    document.getElementById('admin-modal').classList.add('open');
    setTimeout(() => document.getElementById('admin-pass-input').focus(), 100);
  }
}
function closeModal() {
  document.getElementById('admin-modal').classList.remove('open');
  document.getElementById('admin-pass-input').value = '';
  document.getElementById('modal-error').style.display = 'none';
}
function checkAdmin() {
  if (document.getElementById('admin-pass-input').value === ADMIN_PASS) {
    isAdmin = true; closeModal();
    document.getElementById('admin-btn').textContent = '🔓 Admin ON';
    document.getElementById('admin-btn').classList.add('active');
    render(); showToast('✅ Mode admin activé');
  } else {
    document.getElementById('modal-error').style.display = 'block';
  }
}

// ── MATCH ACTIONS ────────────────────────────────────────────────────────────
function startMatch(id) {
  if (!isAdmin) return;
  const m = matches.find(x=>x.id===id); m.status='live'; m.timerRunning=true;
  pushData(); render(); startTimer(id); showToast(`▶ ${m.home} vs ${m.away} — Match lancé !`);
}
function endMatch(id) {
  if (!isAdmin) return;
  const m = matches.find(x=>x.id===id); m.status='done'; m.timerRunning=false;
  if (timers[id]) { clearInterval(timers[id]); delete timers[id]; }
  pushData(); render(); showToast(`✅ Terminé — ${m.home} ${m.scoreHome}:${m.scoreAway} ${m.away}`);
}
function resetMatch(id) {
  if (!isAdmin) return;
  const m = matches.find(x=>x.id===id);
  m.status='pending'; m.timerRunning=false; m.scoreHome=0; m.scoreAway=0; m.elapsed=0;
  if (timers[id]) { clearInterval(timers[id]); delete timers[id]; }
  pushData(); render();
}
function changeScore(id, side, delta) {
  if (!isAdmin) return;
  const m = matches.find(x=>x.id===id);
  if (side==='home') m.scoreHome = Math.max(0, m.scoreHome+delta);
  else m.scoreAway = Math.max(0, m.scoreAway+delta);
  pushData();
  document.getElementById(`score-home-${id}`).textContent = m.scoreHome;
  document.getElementById(`score-away-${id}`).textContent = m.scoreAway;
}

// ── TIMER ────────────────────────────────────────────────────────────────────
function fmt(s) { return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }
function startTimer(id) {
  if (timers[id]) return;
  timers[id] = setInterval(() => {
    const m = matches.find(x=>x.id===id);
    if (!m||!m.timerRunning) { clearInterval(timers[id]); delete timers[id]; return; }
    m.elapsed++;
    const el = document.getElementById(`timer-${id}`);
    if (el) el.textContent = fmt(m.elapsed);
    if (m.elapsed % 30 === 0) pushData();
  }, 1000);
}

// ── UI ───────────────────────────────────────────────────────────────────────
function filterDay(day) {
  currentFilter = day;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.tab.${day}`).classList.add('active');
  render();
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function render() {
  if (!matches.length) return;
  const c = document.getElementById('main-content');
  let html = '';
  const days = currentFilter==='all' ? ['sat','sun'] : [currentFilter];
  const labels = {sat:'Samedi 6 Juin', sun:'Dimanche 7 Juin'};
  days.forEach(day => {
    if (currentFilter==='all') html += `<div class="day-label ${day}">${labels[day]}</div>`;
    matches.filter(m=>m.day===day).forEach(m => {
      const sl = m.status==='live'?'En cours':m.status==='done'?'Terminé':m.time;
      const isLive=m.status==='live', isDone=m.status==='done';
      const dis = isAdmin ? '' : 'disabled';
      html += `
      <div class="match-card ${m.status}">
        <div class="card-header">
          <span class="category">${m.category}</span>
          <span class="status-badge ${m.status}">${sl}</span>
        </div>
        <div class="score-row">
          <div class="team-block"><div class="team-name">${m.home}</div></div>
          <div style="display:flex;align-items:center;gap:4px;">
            <div class="score-controls left">
              <button class="btn-score btn-plus" onclick="changeScore(${m.id},'home',1)" ${dis}>+</button>
              <button class="btn-score btn-minus" onclick="changeScore(${m.id},'home',-1)" ${dis}>−</button>
            </div>
            <div class="score-block">
              <span class="score-num" id="score-home-${m.id}">${m.scoreHome}</span>
              <span class="score-sep">:</span>
              <span class="score-num" id="score-away-${m.id}">${m.scoreAway}</span>
            </div>
            <div class="score-controls">
              <button class="btn-score btn-plus" onclick="changeScore(${m.id},'away',1)" ${dis}>+</button>
              <button class="btn-score btn-minus" onclick="changeScore(${m.id},'away',-1)" ${dis}>−</button>
            </div>
          </div>
          <div class="team-block right"><div class="team-name">${m.away}</div></div>
        </div>
        <div class="card-footer">
          <div class="meta-info">
            <span>⏱ ${m.format}</span>
            ${m.handicap?`<span>⚖️ ${m.handicap}</span>`:''}
            <span>🏟 Vest. ${m.vestiaire}</span>
            <span>👤 ${m.arbitres}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="timer-display ${isLive?'live':''}" id="timer-${m.id}">${fmt(m.elapsed)}</div>
            ${isAdmin?`<div class="action-btns">
              ${!isDone&&!isLive?`<button class="btn-action btn-start" onclick="startMatch(${m.id})">▶ Démarrer</button>`:''}
              ${isLive?`<button class="btn-action btn-end" onclick="endMatch(${m.id})">■ Terminer</button>`:''}
              ${isDone||isLive?`<button class="btn-action btn-reset" onclick="resetMatch(${m.id})">↺</button>`:''}
            </div>`:''}
          </div>
        </div>
        ${!isAdmin?`<div class="readonly-notice">👁 Lecture seule — scores en direct</div>`:''}
      </div>`;
    });
  });
  c.innerHTML = html || '<div style="text-align:center;padding:60px;color:var(--muted)">Aucun match</div>';
  matches.filter(m=>m.timerRunning).forEach(m=>startTimer(m.id));
}

// ── INIT ─────────────────────────────────────────────────────────────────────
fetchData();
setInterval(() => { if (!isSaving) fetchData(); }, 10000);
</script>
</body>
</html>
